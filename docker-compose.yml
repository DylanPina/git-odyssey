services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: gitodyssey
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gitodyssey"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend-init:
    build:
      context: ./backend
      dockerfile: Dockerfile.app
    env_file:
      - ./backend/src/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/gitodyssey
      DATABASE_SSLMODE: disable
      FRONTEND_URL: http://localhost:5173
    working_dir: /app/backend/src
    command: ["python", "bootstrap_schema.py"]
    volumes:
      - ./backend:/app/backend
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.app
    env_file:
      - ./backend/src/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/gitodyssey
      DATABASE_SSLMODE: disable
      FRONTEND_URL: http://localhost:5173
      RELOAD_SERVER: "true"
      WATCHFILES_FORCE_POLLING: "true"
    working_dir: /app/backend/src
    command: ["python", "main.py"]
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/openapi.json || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      backend-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    env_file:
      - ./frontend/.env
    environment:
      API_URL: http://localhost:8000/api
      CHOKIDAR_USEPOLLING: "true"
    working_dir: /app
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  frontend_node_modules:
